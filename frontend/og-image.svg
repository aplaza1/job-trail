<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="white" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- accent top bar -->
  <rect width="1200" height="5" fill="url(#accent)"/>

  <!-- logo mark (left side) -->
  <g transform="translate(100, 215)">
    <rect width="110" height="110" rx="22" fill="url(#accent)"/>
    <circle cx="28" cy="80" r="8" fill="white" opacity="0.55"/>
    <circle cx="55" cy="55" r="8" fill="white" opacity="0.75"/>
    <circle cx="82" cy="30" r="8" fill="white"/>
    <line x1="28" y1="80" x2="55" y2="55" stroke="white" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 5" opacity="0.55"/>
    <line x1="55" y1="55" x2="82" y2="30" stroke="white" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 5" opacity="0.75"/>
  </g>

  <!-- wordmark -->
  <text x="240" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="88" font-weight="700" fill="white" letter-spacing="-2">Job Trail</text>

  <!-- tagline -->
  <text x="243" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="400" fill="white" opacity="0.6">Track every application. Land the job.</text>

  <!-- pill badges -->
  <g transform="translate(243, 390)">
    <rect width="160" height="40" rx="20" fill="#4f46e5" opacity="0.35"/>
    <text x="80" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="white" opacity="0.9" text-anchor="middle">Applications</text>
  </g>
  <g transform="translate(420, 390)">
    <rect width="140" height="40" rx="20" fill="#4f46e5" opacity="0.35"/>
    <text x="70" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="white" opacity="0.9" text-anchor="middle">Interviews</text>
  </g>
  <g transform="translate(577, 390)">
    <rect width="110" height="40" rx="20" fill="#4f46e5" opacity="0.35"/>
    <text x="55" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="white" opacity="0.9" text-anchor="middle">Free</text>
  </g>

  <!-- URL -->
  <text x="100" y="575" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="white" opacity="0.35">jobtrail.dev</text>
</svg>
