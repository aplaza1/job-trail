<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- trail path: three dots connected by a dashed line, bottom-left to top-right -->
  <circle cx="16" cy="46" r="4.5" fill="white" opacity="0.6"/>
  <circle cx="32" cy="32" r="4.5" fill="white" opacity="0.8"/>
  <circle cx="48" cy="18" r="4.5" fill="white"/>
  <line x1="16" y1="46" x2="32" y2="32" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4 3" opacity="0.6"/>
  <line x1="32" y1="32" x2="48" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4 3" opacity="0.8"/>
</svg>
