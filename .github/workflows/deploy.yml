name: Deploy Job Trail

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  NODE_VERSION: '20'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

  deploy-infra:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      api-url: ${{ steps.cdk-outputs.outputs.api-url }}
      user-pool-id: ${{ steps.cdk-outputs.outputs.user-pool-id }}
      user-pool-client-id: ${{ steps.cdk-outputs.outputs.user-pool-client-id }}
      bucket-name: ${{ steps.cdk-outputs.outputs.bucket-name }}
      distribution-id: ${{ steps.cdk-outputs.outputs.distribution-id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: CDK Bootstrap
        working-directory: infra
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          npx cdk bootstrap aws://${AWS_ACCOUNT_ID}/us-west-2
          npx cdk bootstrap aws://${AWS_ACCOUNT_ID}/us-east-1

      - name: CDK Deploy
        working-directory: infra
        run: npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json

      - name: Parse CDK outputs
        id: cdk-outputs
        working-directory: infra
        run: |
          API_URL=$(cat cdk-outputs.json | jq -r '.JobTrailApiStack.ApiUrl')
          USER_POOL_ID=$(cat cdk-outputs.json | jq -r '.JobTrailAuthStack.UserPoolId')
          CLIENT_ID=$(cat cdk-outputs.json | jq -r '.JobTrailAuthStack.UserPoolClientId')
          BUCKET=$(cat cdk-outputs.json | jq -r '.JobTrailHostingStack.BucketName')
          DIST_ID=$(cat cdk-outputs.json | jq -r '.JobTrailHostingStack.DistributionId')
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "user-pool-id=$USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "user-pool-client-id=$CLIENT_ID" >> $GITHUB_OUTPUT
          echo "bucket-name=$BUCKET" >> $GITHUB_OUTPUT
          echo "distribution-id=$DIST_ID" >> $GITHUB_OUTPUT

  deploy-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ needs.deploy-infra.outputs.api-url }}
          VITE_COGNITO_USER_POOL_ID: ${{ needs.deploy-infra.outputs.user-pool-id }}
          VITE_COGNITO_CLIENT_ID: ${{ needs.deploy-infra.outputs.user-pool-client-id }}
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
        run: npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ needs.deploy-infra.outputs.bucket-name }}/ \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ needs.deploy-infra.outputs.bucket-name }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.deploy-infra.outputs.distribution-id }} \
            --paths "/*"
